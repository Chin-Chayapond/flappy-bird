<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #game-container {
      position: relative;
      width: 480px;
      height: 640px;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    #name-input-container {
      position: absolute;
      top: 330px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    #name-label {
      color: #fff;
      font: bold 15px 'Segoe UI', Arial, sans-serif;
      text-shadow: 1px 1px 4px #000;
    }
    #birdNameInput {
      width: 160px;
      padding: 6px 14px;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font: bold 15px 'Segoe UI', Arial, sans-serif;
      text-align: center;
      outline: none;
    }
    #birdNameInput::placeholder { color: rgba(255,255,255,0.4); }
    #color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #color-label {
      color: #fff;
      font: bold 15px 'Segoe UI', Arial, sans-serif;
      text-shadow: 1px 1px 4px #000;
    }
    #birdColorInput {
      width: 48px;
      height: 32px;
      padding: 2px 3px;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 8px;
      background: rgba(0,0,0,0.55);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <div id="name-input-container">
      <div id="name-label">Name your bird</div>
      <input id="birdNameInput" type="text" maxlength="20" placeholder="Bird" spellcheck="false" autocomplete="off">
      <div id="color-row">
        <span id="color-label">Bird color</span>
        <input id="birdColorInput" type="color" value="#3498db">
      </div>
    </div>
  </div>

  <script>
    // === Game Constants ===
    const CANVAS_W = 480, CANVAS_H = 640;
    const BIRD_W = 40, BIRD_H = 30;
    const BIRD_X = 80;
    const PIPE_GAP = 150;
    const PIPE_WIDTH = 60;
    const PIPE_SPEED_INITIAL = 0.12;   // px/ms
    const PIPE_SPEED_INCREMENT = 0.006; // px/ms per 10 pipes
    const PIPE_SPAWN_INTERVAL = 1500;  // ms
    const MIN_PIPE_Y = 80;
    const MAX_PIPE_Y = CANVAS_H - PIPE_GAP - 80;
    const RESTART_COOLDOWN = 1000;     // ms

    // === State Machine ===
    const GameState = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };

    // === Canvas Setup ===
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // === Game State ===
    let state = GameState.START;
    let pipes = [];
    let score = 0;
    let highScore = getHighScore();
    let lastTimestamp = 0;
    let lastPipeSpawnTime = 0;
    let currentSpeed = PIPE_SPEED_INITIAL;
    let birdY = CANVAS_H / 2 - BIRD_H / 2;
    let gameOverTime = 0;
    let isNewHighScore = false;
    let startTextOpacity = 1;
    let startTextDirection = -1;
    let birdName = 'Bird';
    let birdColor = '#3498db';

    // === Name / Color Input ===
    const nameInputContainer = document.getElementById('name-input-container');
    const birdNameInput = document.getElementById('birdNameInput');
    const colorPickerInput = document.getElementById('birdColorInput');

    // === Color Helpers ===
    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function colorDarken(hex, f=0.72) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
    }
    function colorLighten(hex, f=0.5) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.floor(r+(255-r)*f)},${Math.floor(g+(255-g)*f)},${Math.floor(b+(255-b)*f)})`;
    }

    // === Trigger Game Over ===
    function triggerGameOver() {
      state = GameState.GAMEOVER;
      gameOverTime = performance.now();
      isNewHighScore = saveHighScore(score);
      highScore = getHighScore();
      setTimeout(() => {
        if (state === GameState.GAMEOVER) {
          document.getElementById('name-label').textContent = 'Rename or change color?';
          birdNameInput.value = birdName;
          colorPickerInput.value = birdColor;
          nameInputContainer.style.display = 'flex';
        }
      }, RESTART_COOLDOWN);
    }

    // === Keyboard Controls ===
    const BIRD_SPEED = 0.35; // px/ms (~21px/frame at 60fps)
    const keys = { up: false, down: false };
    document.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') { keys.up = true; if (state === GameState.START) { birdName = birdNameInput.value.trim() || 'Bird'; birdColor = colorPickerInput.value; nameInputContainer.style.display = 'none'; state = GameState.PLAYING; lastPipeSpawnTime = 0; } }
      if (e.code === 'ArrowDown' || e.code === 'KeyS') { keys.down = true; if (state === GameState.START) { birdName = birdNameInput.value.trim() || 'Bird'; birdColor = colorPickerInput.value; nameInputContainer.style.display = 'none'; state = GameState.PLAYING; lastPipeSpawnTime = 0; } }
      if (e.code === 'Space') handleRestart();
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
    });

    // === Pure Functions ===

    function mapHandToBirdY(handY, canvasHeight, birdHeight) {
      return handY * canvasHeight - birdHeight / 2;
    }

    function rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    function checkCollision(birdX, birdY, birdW, birdH, pipe) {
      const hitsTop = rectsOverlap(birdX, birdY, birdW, birdH, pipe.x, 0, pipe.width, pipe.topHeight);
      const hitsBottom = rectsOverlap(birdX, birdY, birdW, birdH, pipe.x, pipe.bottomY, pipe.width, CANVAS_H - pipe.bottomY);
      return hitsTop || hitsBottom;
    }

    function createPipe(canvasWidth, canvasHeight, gap, minY, maxY) {
      const topHeight = minY + Math.random() * (maxY - minY);
      return { x: canvasWidth, topHeight, bottomY: topHeight + gap, width: PIPE_WIDTH, passed: false };
    }

    function updatePipes(pipes, speed, deltaTime) {
      for (const pipe of pipes) { pipe.x -= speed * deltaTime; }
      return pipes.filter(p => p.x + p.width > 0);
    }

    function checkPipePass(birdX, pipe) {
      if (!pipe.passed && birdX > pipe.x + pipe.width) {
        pipe.passed = true;
        return true;
      }
      return false;
    }

    function getHighScore() {
      return parseInt(localStorage.getItem('flappyBirdHighScore') || '0', 10);
    }

    function saveHighScore(score) {
      const current = getHighScore();
      if (score > current) {
        localStorage.setItem('flappyBirdHighScore', score.toString());
        return true;
      }
      return false;
    }

    // GameLogic functions -- keep in sync between index.html and test.html
    window.GameLogic = {
      mapHandToBirdY, checkCollision, rectsOverlap,
      createPipe, updatePipes, checkPipePass,
      updateScore: saveHighScore
    };

    // === Reset Game ===
    function resetGame() {
      pipes = [];
      score = 0;
      currentSpeed = PIPE_SPEED_INITIAL;
      birdY = CANVAS_H / 2 - BIRD_H / 2;
      lastPipeSpawnTime = 0;
      isNewHighScore = false;
      state = GameState.PLAYING;
    }

    // === Restart Mechanic ===
    function handleRestart() {
      if (state !== GameState.GAMEOVER) return;
      if (performance.now() - gameOverTime < RESTART_COOLDOWN) return;
      birdName = birdNameInput.value.trim() || 'Bird';
      birdColor = colorPickerInput.value;
      nameInputContainer.style.display = 'none';
      document.getElementById('name-label').textContent = 'Name your bird';
      resetGame();
    }
    canvas.addEventListener('click', handleRestart);

    // === Update ===
    function update(deltaTime) {
      if (deltaTime > 100) deltaTime = 100; // cap large deltas

      if (state === GameState.START) {
        // Animate start text pulsing
        startTextOpacity += startTextDirection * 0.015;
        if (startTextOpacity <= 0.3) startTextDirection = 1;
        if (startTextOpacity >= 1) startTextDirection = -1;
        return;
      }

      if (state !== GameState.PLAYING) return;

      // Update bird position from keyboard
      if (keys.up) birdY -= BIRD_SPEED * deltaTime;
      if (keys.down) birdY += BIRD_SPEED * deltaTime;

      // Boundary collision (no clamping)
      if (birdY <= 0 || birdY + BIRD_H >= CANVAS_H) {
        triggerGameOver(); return;
      }

      // Speed progression
      currentSpeed = PIPE_SPEED_INITIAL + Math.floor(score / 10) * PIPE_SPEED_INCREMENT;

      // Spawn pipes
      lastPipeSpawnTime += deltaTime;
      if (lastPipeSpawnTime >= PIPE_SPAWN_INTERVAL) {
        pipes.push(createPipe(CANVAS_W, CANVAS_H, PIPE_GAP, MIN_PIPE_Y, MAX_PIPE_Y));
        lastPipeSpawnTime -= PIPE_SPAWN_INTERVAL;
      }

      // Update pipes
      pipes = updatePipes(pipes, currentSpeed, deltaTime);

      // Check collisions and scoring
      for (const pipe of pipes) {
        if (checkCollision(BIRD_X, birdY, BIRD_W, BIRD_H, pipe)) {
          triggerGameOver(); return;
        }
        if (checkPipePass(BIRD_X, pipe)) {
          score++;
        }
      }
    }

    // === Render ===
    function render() {
      // Background gradient
      const bgGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
      bgGrad.addColorStop(0, '#70c5ce');
      bgGrad.addColorStop(1, '#4ec0ca');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Clouds (decorative)
      drawClouds();

      // Pipes
      for (const pipe of pipes) {
        drawPipe(pipe);
      }

      // Ground strip
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(0, CANVAS_H - 20, CANVAS_W, 20);
      ctx.fillStyle = '#5a8a2f';
      ctx.fillRect(0, CANVAS_H - 20, CANVAS_W, 4);

      // Bird + name tag
      if (state === GameState.PLAYING || state === GameState.GAMEOVER) {
        drawBird(BIRD_X, birdY);
        ctx.save();
        ctx.font = 'bold 13px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        ctx.strokeText(birdName, BIRD_X + BIRD_W / 2, birdY - 4);
        ctx.fillStyle = '#fff';
        ctx.fillText(birdName, BIRD_X + BIRD_W / 2, birdY - 4);
        ctx.restore();
      }

      // Score during play
      if (state === GameState.PLAYING) {
        drawScore(score);
      }

      // Overlays
      if (state === GameState.START) {
        drawStartScreen();
      } else if (state === GameState.GAMEOVER) {
        drawGameOverScreen();
      }
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      // Static cloud positions
      const clouds = [
        { x: 50, y: 80, w: 80, h: 30 },
        { x: 200, y: 150, w: 100, h: 35 },
        { x: 350, y: 60, w: 70, h: 25 },
        { x: 120, y: 250, w: 90, h: 28 },
        { x: 380, y: 200, w: 75, h: 22 },
      ];
      for (const c of clouds) {
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.w * 0.25, c.y + 5, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.w * 0.25, c.y + 3, c.w * 0.35, c.h * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPipe(pipe) {
      const capHeight = 24;
      const capOverhang = 6;

      // Top pipe body
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
      ctx.strokeStyle = '#27ae60';
      ctx.lineWidth = 3;
      ctx.strokeRect(pipe.x, 0, pipe.width, pipe.topHeight);

      // Top pipe cap
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(pipe.x - capOverhang, pipe.topHeight - capHeight, pipe.width + capOverhang * 2, capHeight);
      ctx.strokeStyle = '#27ae60';
      ctx.strokeRect(pipe.x - capOverhang, pipe.topHeight - capHeight, pipe.width + capOverhang * 2, capHeight);

      // Top pipe highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(pipe.x + 6, 0, 8, pipe.topHeight - capHeight);

      // Bottom pipe body
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, CANVAS_H - pipe.bottomY);
      ctx.strokeStyle = '#27ae60';
      ctx.lineWidth = 3;
      ctx.strokeRect(pipe.x, pipe.bottomY, pipe.width, CANVAS_H - pipe.bottomY);

      // Bottom pipe cap
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(pipe.x - capOverhang, pipe.bottomY, pipe.width + capOverhang * 2, capHeight);
      ctx.strokeStyle = '#27ae60';
      ctx.strokeRect(pipe.x - capOverhang, pipe.bottomY, pipe.width + capOverhang * 2, capHeight);

      // Bottom pipe highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(pipe.x + 6, pipe.bottomY + capHeight, 8, CANVAS_H - pipe.bottomY - capHeight);
    }

    function drawBird(x, y) {
      ctx.save();

      // Body (user-chosen color)
      ctx.fillStyle = birdColor;
      ctx.beginPath();
      ctx.ellipse(x + BIRD_W / 2, y + BIRD_H / 2, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = colorDarken(birdColor);
      ctx.lineWidth = 2;
      ctx.stroke();

      // Wing
      ctx.fillStyle = colorLighten(birdColor);
      ctx.beginPath();
      ctx.ellipse(x + BIRD_W * 0.35, y + BIRD_H * 0.55, 12, 7, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Eye (white circle with black pupil)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x + BIRD_W * 0.7, y + BIRD_H * 0.35, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x + BIRD_W * 0.73, y + BIRD_H * 0.35, 3, 0, Math.PI * 2);
      ctx.fill();

      // Beak (triangle)
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.moveTo(x + BIRD_W - 2, y + BIRD_H * 0.4);
      ctx.lineTo(x + BIRD_W + 12, y + BIRD_H * 0.5);
      ctx.lineTo(x + BIRD_W - 2, y + BIRD_H * 0.65);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawScore(s) {
      ctx.save();
      ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      ctx.strokeText(s.toString(), CANVAS_W / 2, 30);
      ctx.fillStyle = '#fff';
      ctx.fillText(s.toString(), CANVAS_W / 2, 30);
      ctx.restore();
    }

    function drawStartScreen() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Title
      ctx.font = 'bold 42px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = '#f5a623';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      ctx.strokeText('Flappy Bird', CANVAS_W / 2, CANVAS_H * 0.3);
      ctx.fillText('Flappy Bird', CANVAS_W / 2, CANVAS_H * 0.3);

      // Key icon (pulsing)
      ctx.font = '64px Arial';
      ctx.fillStyle = `rgba(255, 255, 255, ${startTextOpacity})`;
      ctx.fillText('\u2B06\u2B07', CANVAS_W / 2, CANVAS_H * 0.48);

      // Instruction text (pulsing)
      ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = `rgba(255, 255, 255, ${startTextOpacity})`;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText('Press any key to play', CANVAS_W / 2, CANVAS_H * 0.62);
      ctx.fillText('Press any key to play', CANVAS_W / 2, CANVAS_H * 0.62);

      // Subtitle
      ctx.font = '16px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fillText('\u2191 \u2193  /  W S  controls the bird', CANVAS_W / 2, CANVAS_H * 0.7);

      ctx.restore();
    }

    function drawGameOverScreen() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Game Over title
      ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      ctx.fillStyle = '#e74c3c';
      ctx.strokeText('Game Over', CANVAS_W / 2, CANVAS_H * 0.28);
      ctx.fillText('Game Over', CANVAS_W / 2, CANVAS_H * 0.28);

      // Score panel background
      const panelX = CANVAS_W / 2 - 120;
      const panelY = CANVAS_H * 0.36;
      const panelW = 240;
      const panelH = 140;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 12);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Score
      ctx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Score', CANVAS_W / 2, panelY + 30);
      ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(score.toString(), CANVAS_W / 2, panelY + 65);

      // High Score
      ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Best: ' + highScore, CANVAS_W / 2, panelY + 105);

      // New High Score badge
      if (isNewHighScore) {
        ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = '#f1c40f';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText('New High Score!', CANVAS_W / 2, CANVAS_H * 0.65);
        ctx.fillText('New High Score!', CANVAS_W / 2, CANVAS_H * 0.65);
      }

      // Restart prompt (shown after cooldown)
      if (performance.now() - gameOverTime >= RESTART_COOLDOWN) {
        ctx.font = '16px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.fillText('Rename or change color below,', CANVAS_W / 2, CANVAS_H * 0.76);
        ctx.fillText('then Click or press Space to restart', CANVAS_W / 2, CANVAS_H * 0.82);
      }

      ctx.restore();
    }

    // === Game Loop ===
    function gameLoop(timestamp) {
      const deltaTime = timestamp - lastTimestamp;
      lastTimestamp = timestamp;
      update(deltaTime);
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame((timestamp) => {
      lastTimestamp = timestamp;
      requestAnimationFrame(gameLoop);
    });

  </script>
</body>
</html>
